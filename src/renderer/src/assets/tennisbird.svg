<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tb1-body" cx="40%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#f7ff8a"/>
      <stop offset="45%" stop-color="#e3f24a"/>
      <stop offset="80%" stop-color="#bcd827"/>
      <stop offset="100%" stop-color="#8fb01b"/>
    </radialGradient>
    <radialGradient id="tb1-shine" cx="38%" cy="28%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="tb1-fuzz" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- fuzzy fur halo -->
  <circle cx="110" cy="116" r="92" fill="#cfe85a" filter="url(#tb1-fuzz)" opacity="0.9"/>
  <!-- body -->
  <circle cx="110" cy="114" r="84" fill="url(#tb1-body)"/>
  <!-- tennis seams -->
  <path d="M34 64 C78 100 78 142 38 182" fill="none" stroke="#fbfdee" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
  <path d="M186 64 C142 100 142 142 182 182" fill="none" stroke="#fbfdee" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
  <!-- soft shading bottom -->
  <ellipse cx="110" cy="170" rx="70" ry="34" fill="#7e9a14" opacity="0.18"/>
  <!-- highlight -->
  <circle cx="86" cy="80" r="42" fill="url(#tb1-shine)"/>
  <!-- eye -->
  <ellipse cx="132" cy="96" rx="12" ry="13" fill="#16160f"/>
  <circle cx="136" cy="91" r="4" fill="#fff"/>
  <circle cx="129" cy="100" r="2" fill="#ffffff" opacity="0.6"/>
  <!-- beak -->
  <path d="M158 104 L200 112 L158 126 Q149 115 158 104 Z" fill="#d8ad4e" stroke="#a9842f" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M158 116 L196 113" stroke="#a9842f" stroke-width="2" opacity="0.6"/>
</svg>
