<svg width="220" height="248" viewBox="0 0 220 248" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="tb2-body" cx="40%" cy="30%" r="72%">
      <stop offset="0%" stop-color="#f7ff8a"/>
      <stop offset="45%" stop-color="#e3f24a"/>
      <stop offset="80%" stop-color="#bcd827"/>
      <stop offset="100%" stop-color="#8fb01b"/>
    </radialGradient>
    <radialGradient id="tb2-foot" cx="45%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#f3cda3"/>
      <stop offset="100%" stop-color="#d6a173"/>
    </radialGradient>
    <filter id="tb2-fuzz" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- human feet (the cursed part) -->
  <g stroke="#bd895d" stroke-width="2">
    <rect x="64" y="168" width="18" height="40" rx="9" fill="url(#tb2-foot)"/>
    <rect x="138" y="168" width="18" height="40" rx="9" fill="url(#tb2-foot)"/>
    <ellipse cx="80" cy="214" rx="30" ry="16" fill="url(#tb2-foot)"/>
    <ellipse cx="140" cy="214" rx="30" ry="16" fill="url(#tb2-foot)"/>
    <g stroke="#bd895d" stroke-width="1.2" fill="#f0c89c">
      <circle cx="98" cy="210" r="3.4"/><circle cx="104" cy="214" r="3"/><circle cx="108" cy="219" r="2.6"/>
      <circle cx="158" cy="210" r="3.4"/><circle cx="164" cy="214" r="3"/><circle cx="168" cy="219" r="2.6"/>
    </g>
  </g>

  <!-- fuzzy fur halo -->
  <circle cx="110" cy="100" r="90" fill="#cfe85a" filter="url(#tb2-fuzz)" opacity="0.9"/>
  <!-- body -->
  <circle cx="110" cy="98" r="82" fill="url(#tb2-body)"/>
  <path d="M36 50 C80 86 80 128 40 166" fill="none" stroke="#fbfdee" stroke-width="7" stroke-linecap="round" opacity="0.95"/>
  <path d="M184 50 C140 86 140 128 180 166" fill="none" stroke="#fbfdee" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- googly eyes -->
  <g>
    <circle cx="84" cy="84" r="26" fill="#fff" stroke="#1a1a12" stroke-width="3.5"/>
    <circle cx="126" cy="84" r="26" fill="#fff" stroke="#1a1a12" stroke-width="3.5"/>
    <circle cx="89" cy="94" r="11" fill="#13130d"/>
    <circle cx="121" cy="94" r="11" fill="#13130d"/>
    <circle cx="85" cy="89" r="3.5" fill="#fff"/>
    <circle cx="117" cy="89" r="3.5" fill="#fff"/>
  </g>
  <!-- beak -->
  <path d="M92 118 L110 140 L128 118 Q110 126 92 118 Z" fill="#d8ad4e" stroke="#a9842f" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
