<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20301f"/>
      <stop offset="100%" stop-color="#0e1411"/>
    </linearGradient>
    <radialGradient id="ball" cx="40%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#f7ff8a"/>
      <stop offset="45%" stop-color="#e3f24a"/>
      <stop offset="80%" stop-color="#bcd827"/>
      <stop offset="100%" stop-color="#8fb01b"/>
    </radialGradient>
    <radialGradient id="shine" cx="38%" cy="28%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="fuzz" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="10" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#frame)"/>
  <rect x="6" y="6" width="500" height="500" rx="106" fill="none" stroke="#3a5a2c" stroke-width="4" opacity="0.6"/>

  <g transform="translate(256 268)">
    <!-- fuzzy fur halo -->
    <circle cx="0" cy="4" r="176" fill="#cfe85a" filter="url(#fuzz)" opacity="0.9"/>
    <!-- body -->
    <circle cx="0" cy="0" r="160" fill="url(#ball)"/>
    <!-- tennis seams -->
    <path d="M-150 -95 C-70 -30 -70 50 -146 118" fill="none" stroke="#fbfdee" stroke-width="13" stroke-linecap="round" opacity="0.95"/>
    <path d="M150 -95 C70 -30 70 50 146 118" fill="none" stroke="#fbfdee" stroke-width="13" stroke-linecap="round" opacity="0.95"/>
    <!-- highlight -->
    <circle cx="-46" cy="-58" r="80" fill="url(#shine)"/>
    <!-- eye -->
    <ellipse cx="52" cy="-18" rx="22" ry="24" fill="#16160f"/>
    <circle cx="60" cy="-28" r="7" fill="#fff"/>
    <!-- beak -->
    <path d="M96 -6 L182 10 L96 34 Q80 14 96 -6 Z" fill="#d8ad4e" stroke="#a9842f" stroke-width="5" stroke-linejoin="round"/>
  </g>
</svg>
